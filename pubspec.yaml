  firebase_dynamic_links: ^5.3.7
  firebase_in_app_messaging: ^0.7.3+7
  firebase_messaging: ^13.1.0
  firebase_remote_config: ^2.0.20
  flare_flutter: ^3.0.2
  flutter:
