[[routes]]
pattern = "prismwalls.com/api/*"
zone_name = "prismwalls.com"

[[routes]]
pattern = "prismwalls.com/l/*"
zone_name = "prismwalls.com"

[[routes]]
pattern = "prismwalls.com/og/*"
zone_name = "prismwalls.com"

[[routes]]
pattern = "prismwalls.com/share*"
