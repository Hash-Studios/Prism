name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r '.flutter' .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          find lib test -name '*.dart' \
            ! -name '*.g.dart' \
            ! -name '*.freezed.dart' \
            ! -name '*.gr.dart' \
            ! -name '*.config.dart' \
            -print0 | xargs -0 dart format --line-length 120 --set-exit-if-changed -o none

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Run tests
        run: |
          if ls test/*_test.dart >/dev/null 2>&1 || find test -name '*_test.dart' -print -quit | grep -q .; then
            flutter test
          else
            echo "No test files found, skipping."
          fi
