        key: color
        type: string
  - id: paywall_impression
    fields:
      - name: source
        key: source
        type: string
      - name: placement
        key: placement
        type: string
      - name: rc_or_fallback
        key: rc_or_fallback
        type: enum
        enum: RcOrFallbackValue
  - id: paywall_result
    fields:
      - name: source
        key: source
        type: string
      - name: placement
        key: placement
        type: string
      - name: result
        key: result
        type: enum
        enum: PaywallResultValue
      - name: rc_or_fallback
        key: rc_or_fallback
        type: enum
        enum: RcOrFallbackValue
      - name: placement_offering
        key: placement_offering
        type: string
        required: false
      - name: selected_offering
        key: selected_offering
        type: string
        required: false
      - name: entitlement_synced
        key: entitlement_synced
        type: int
        required: false
      - name: entitlement
        key: entitlement
        type: string
        required: false
      - name: error
        key: error
        type: string
        required: false
  - id: subscription_trigger_low_balance
