  paginate_firestore: ^1.0.3
  palette_generator: ^0.3.0
  permission_handler: ^12.0.1
  photo_view: ^0.15.0
  photofilters: ^3.0.0
  pixel_perfect: ^1.1.0
  provider: ^6.1.5+1
