version: 1

enums:
  - name: wallpaper_target
    dart_type: WallpaperTargetValue
    values:
      - both
      - lock
      - home
  - name: binary_result
    dart_type: BinaryResultValue
    values:
      - success
      - failure
  - name: subscription_result
    dart_type: SubscriptionResultValue
    values:
      - success
      - not_entitled
      - failure
  - name: rc_or_fallback
    dart_type: RcOrFallbackValue
    values:
      - rc_attempt
      - fallback_only
      - fallback
      - rc
  - name: paywall_result
    dart_type: PaywallResultValue
    values:
      - placement_overridden_to_v3
      - no_offering
      - not_presented
      - error
      - cancelled
      - purchased
      - restored
      - rc_error
      - unknown
  - name: subscription_entitlement_refresh_result
    dart_type: SubscriptionEntitlementRefreshResultValue
    values:
      - success
      - failure
  - name: coin_earn_action
    dart_type: CoinEarnActionValue
    values:
      - rewarded_ad
      - daily_login
      - streak_bonus
      - first_wallpaper_upload
      - referral
      - profile_completion
      - pro_daily_bonus
      - refund
  - name: coin_spend_action
    dart_type: CoinSpendActionValue
    values:
      - wallpaper_download
      - premium_wallpaper_download
      - ai_generation
      - premium_filter
      - premium_preview_24h
  - name: ai_charge_mode
    dart_type: AiChargeModeValue
    values:
      - free_trial
      - pro_included
      - coin_spend
      - insufficient

events:
  - id: report_setup
  - id: report_wall
  - id: setup_fav_status_changed
    fields:
      - name: setup_id
        key: id
        type: string
  - id: download_own_setup
    fields:
      - name: link
        key: link
        type: string
  - id: download_own_wall
    fields:
      - name: link
        key: link
        type: string
  - id: set_wall
    fields:
      - name: wallpaper_target
        key: wallpaper_target
        type: enum
        enum: WallpaperTargetValue
      - name: result
        key: result
        type: enum
        enum: BinaryResultValue
  - id: coin_premium_filter_spend_attempt
    fields:
      - name: source_tag
        key: source_tag
        type: string
      - name: filter
        key: filter
        type: string
  - id: coin_premium_filter_spend_success
    fields:
      - name: source_tag
        key: source_tag
        type: string
      - name: coins_spent
        key: coins_spent
        type: int
      - name: filter
        key: filter
        type: string
  - id: coin_filter_watch_and_retry_used
    fields:
      - name: source_tag
        key: source_tag
        type: string
      - name: filter
        key: filter
        type: string
  - id: download_wallpaper
    fields:
      - name: link
        key: link
        type: string
      - name: source_context
        key: source_context
        type: string
        required: false
      - name: premium_content
        key: premium_content
        type: bool
        required: false
  - id: upload_wallpaper
    fields:
      - name: asset_id
        key: id
        type: string
      - name: link
        key: link
        type: string
  - id: accent_changed
    fields:
