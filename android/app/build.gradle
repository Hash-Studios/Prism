plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.hash.prism"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }

    lint {
        disable 'InvalidPackage'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.hash.prism"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Expose the Pexels API key to native Kotlin (e.g. TileService) via BuildConfig.
        // The value is passed in via --dart-define=PEXELS_API_KEY=... at build time and
        // forwarded here through the project property set by the Flutter Gradle plugin.
        def pexelsApiKey = ''
        def dartDefinesRaw = project.findProperty('dart-defines')
        if (dartDefinesRaw) {
            dartDefinesRaw.toString().split(',').each { encoded ->
                def decoded = new String(encoded.decodeBase64(), 'UTF-8')
                if (decoded.startsWith('PEXELS_API_KEY=')) {
                    // Strip any surrounding quotes that Doppler may inject (e.g. "value" → value)
                    def raw = decoded.split('=', 2)[1]
                    pexelsApiKey = raw.replaceAll(/^["']|["']$/, '')
                }
            }
        }
        buildConfigField "String", "PEXELS_API_KEY", "\"${pexelsApiKey}\""
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // signingConfig signingConfigs.debug
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'),
                    'proguard-rules.pro'
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "com.squareup.picasso:picasso:2.71828"
}

flutter {
    source '../..'
}

if (file("google-services.json").exists()) {
    apply plugin: 'com.google.gms.google-services'
} else {
    logger.lifecycle("google-services.json not found, skipping Google Services plugin for local builds.")
}
