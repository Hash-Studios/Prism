name = "prismwalls-links"
main = "src/index.ts"
compatibility_date = "2026-02-18"

routes = [
  { pattern = "prismwalls.com/api/*", zone_name = "prismwalls.com" },
  { pattern = "prismwalls.com/l/*", zone_name = "prismwalls.com" },
  { pattern = "prismwalls.com/share*", zone_name = "prismwalls.com" },
  { pattern = "prismwalls.com/user*", zone_name = "prismwalls.com" },
  { pattern = "prismwalls.com/setup*", zone_name = "prismwalls.com" },
  { pattern = "prismwalls.com/refer*", zone_name = "prismwalls.com" }
]

[vars]
PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.hash.prism"
APP_STORE_URL = "https://apps.apple.com/app/id1405860595"

[[kv_namespaces]]
binding = "LINKS_KV"
id = "c05f625aeba84fa7a6299894c3004775"
preview_id = "7937369ebc9d450f863783300c08a0ab"
